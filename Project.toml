# Minimal environment for `runner.jl`, `setup.jl`, `suggest_workers.jl`.
#
# This tree ships `Project.toml` only. For a standalone kit directory, run
# `julia --project=<kit_dir> -e 'using Pkg; Pkg.instantiate()'` to create a
# local `Manifest.toml` (gitignored in this repo). When embedding in an app,
# merge these `[deps]` into the host `Project.toml` instead.

name = "ParallelRunnerKit"
